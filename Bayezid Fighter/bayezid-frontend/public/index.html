<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayezid SOAR - Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
            margin: 0;
        }
        
        h1 {
            color: #58a6ff;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .dashboard-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            max-width: 1200px;
            margin: auto;
        }
        
        .panel {
            background: #161b22;
            padding: 25px;
            border-radius: 10px;
            flex: 1;
            min-width: 350px;
            border: 1px solid #30363d;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .panel h2 {
            margin-top: 0;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
            color: #e6edf3;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #8b949e;
            font-weight: bold;
            font-size: 14px;
        }
        
        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            background: #0d1117;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: monospace;
        }
        
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #58a6ff;
        }
        
        button {
            background: #238636;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 16px;
            transition: 0.2s;
        }
        
        button:hover {
            background: #2ea043;
        }
        
        .refresh-btn {
            background: #1f6feb;
            margin-bottom: 15px;
        }
        
        .refresh-btn:hover {
            background: #388bfd;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }
        
        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #30363d;
            text-align: left;
        }
        
        th {
            background: #21262d;
            color: #8b949e;
        }
        
        tr:hover {
            background: #1c2128;
        }
        
        .status-msg {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>

<body>

    <h1>🛡️ Bayezid Cognitive SOAR V2</h1>

    <div class="dashboard-container">

        <div class="panel">
            <h2>🧪 Run Attack Simulation</h2>
            <form id="simulationForm">
                <div class="form-group">
                    <label>Attack Type</label>
                    <input type="text" id="attackType" placeholder="e.g., SQL Injection, XSS, Brute Force" required>
                </div>

                <div class="form-group">
                    <label>Log Format</label>
                    <select id="logFormat">
                        <option value="raw">Raw Logs (Text)</option>
                        <option value="json">JSON Format</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Extra Parameters (Optional)</label>
                    <input type="text" id="parameters" placeholder="e.g., target_port=80, user=admin">
                </div>

                <div class="form-group">
                    <label>Log Data</label>
                    <textarea id="logData" rows="8" placeholder="Paste your Raw Logs or JSON payload here..." required></textarea>
                </div>

                <button type="submit">Run Simulation</button>
                <div id="simResult" class="status-msg"></div>
            </form>
        </div>

        <div class="panel">
            <h2>📊 Alerts & Simulation History</h2>
            <button id="refreshHistoryBtn" class="refresh-btn">🔄 Refresh Data</button>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Event Type</th>
                            <th>Source IP</th>
                            <th>Severity</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="/js/app.js"></script>
</body>

</html>
